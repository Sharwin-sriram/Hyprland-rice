# User greeting
label {
    color = rgb(180, 180, 180)
    text = Hi $USER :)
    font_family = $font_greet
    font_size = 20

    position = 0 , 30
    halign = center
    valign = bottom
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%d %B %Y" # update every 60 seconds
    font_size = 25
    font_family = $font_date
    color = rgb(95, 112, 117)

    position = -10, 10
    halign = right
    valign = bottom
}

