$font = JetBrainsMono Nerd Font
$font_weather = Google Sans
$font_weather_bold = Google Sans Bold
$font_clock = SF Pro Display
$font_greet = Minecraft Ten
$font_player = Homepagebaukasten Thin
# $font_greet = Minecraft Enchantment
$offset = 100

general {
    fail_timeout = 2000
    hide_cursor = true
    ignore_empty_input = true
}

# global
#   ↳ fade
    # ↳ fadeIn - fade to lockscreen
    # ↳ fadeOut - fade back to the wayland session
#   ↳ inputField
    # ↳ inputFieldColors - fade between colors and gradients
    # ↳ inputFieldFade - fade_on_empty animation
    # ↳ inputFieldWidth - adaptive width animation
    # ↳ inputFieldDots - fade in/out for individual dots in the input field

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear

    animation = inputFieldDots, 1, 2, linear
    animation = inputFieldFade, 1, 2, linear
    animation = inputFieldWidth, 1, 2, linear
    animation = inputFieldColors, 1, 2, linear
}

background {
    monitor = 
    # path = $HOME/Wallpapers/goods/The_Crew_2_Artwork.jpeg
    path = $HOME/Wallpapers/goods/Quiet_moment.jpg
    # path = $HOME/Wallpapers/8-bit-pixel-art-city-2o.jpg
    # color = rgba(25, 20, 20, 0.0)

    blur_passes = 2 # 0 disables blurring
    blur_size = 0
    # noise = 0.0117
    # contrast = 1
    # brightness = 0.8
    # vibrancy = 0.1696
    vibrancy_darkness = 0.0
    zindex = -20
}

input-field {
    monitor = 
    size = 25%, 40%
    outline_thickness = 7
    inner_color = rgba(0, 0, 0, 0)

    outer_color = rgb(234, 215, 205)
    check_color = rgba(0,0,0,0)
    # check_color = rgb(0, 170, 255) rgb(0,200,200) rgb(0,170,170) 45deg
    fail_color = rgb(157, 0, 0);

    font_color = rgba(215, 215, 215, 0.5)
    fade_on_empty = false
    rounding = 1000000000

    font_family = $font_greet
    # placeholder_text = Hi $USER :)
    placeholder_text = 
    fail_text = 

    dots_spacing = 0.2

    hide_input = true
    hide_input_base_color = rgb(255,255,255)
    # hide_input_base_color = rgb(137, 156, 186)

    position = 0, 50 + $offset
    halign = center
    valign = center
}

# TIME HOURS
label {
    monitor =
    text = cmd[update:1000] echo $(date +"%r" | awk -F ':' '{print $1}')
    font_size = 90
    font_family = $font_clock
    color = rgb(241, 199, 200)

    position = 0 , 120 + $offset
    halign = center
    valign = center
}

# TIME MINUTES
label {
    monitor = 
    text = cmd[update:1000] echo $(date +"%r" | awk -F ':' '{print $2}')
    font_size = 90
    font_family = $font_clock
    color = rgb(192, 189, 204)

    position = 0 , 0 + $offset
    halign = center
    valign = center
}

# AM/PM
label {
    monitor = 
    text = cmd[update:1000] echo $(date +"%r" | awk '/:/ {print $2}')
    font_size = 50
    font_family = $font_clock
    color = rgb(192, 189, 204)

    position = 125 , 10
    halign = center
    valign = center
}

# GREETING THE USER
label {
    monitor = 
    color = rgb(180, 180, 180)
    text = Hi $USER :)
    font_family = $font_greet
    font_size = 20

    position = 40 , 25
    halign = left
    valign = bottom
}

