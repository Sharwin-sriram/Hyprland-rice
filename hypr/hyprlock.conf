# sample hyprlock.conf
# for more configuration options, refer https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
#
# rendered text in all widgets supports pango markup (e.g. <b> or <i> tags)
# ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#general-remarks
#
# shortcuts to clear password buffer: ESC, Ctrl+U, Ctrl+Backspace
#
# you can get started by copying this config to ~/.config/hypr/hyprlock.conf
#

$font = JetBrainsMono Nerd Font

general {
    fail_timeout = 2000
    hide_cursor = false
    ignore_empty_input = true
}

# global
#   ↳ fade
    # ↳ fadeIn - fade to lockscreen
    # ↳ fadeOut - fade back to the wayland session
#   ↳ inputField
    # ↳ inputFieldColors - fade between colors and gradients
    # ↳ inputFieldFade - fade_on_empty animation
    # ↳ inputFieldWidth - adaptive width animation
    # ↳ inputFieldDots - fade in/out for individual dots in the input field

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear

    animation = inputFieldDots, 1, 2, linear
    animation = inputFieldFade, 1, 2, linear
    animation = inputFieldWidth, 1, 2, linear
    animation = inputFieldColors, 1, 2, linear
}

background {
    monitor =
    # path = $HOME/Wallpapers/goods/The_Crew_2_Artwork.jpeg
    path = $HOME/Wallpapers/goods/Quiet_moment.jpg
    # color = rgba(25, 20, 20, 0.0)

    # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
    blur_passes = 2 # 0 disables blurring
    blur_size = 0
    # noise = 0.0117
    # contrast = 1
    # brightness = 0.8
    # vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 1
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgba(0,0,0,0)
    check_color = rgba(0,0,0,0)
    fail_color = rgba(0, 0, 0,0);

    # font_family = "Jet Brains Mono Nerd Font"
    font_color = rgb(206, 206, 206)
    fade_on_empty = false
    rounding = 15

    font_family = $font
    placeholder_text = Input password...
    fail_text = $PAMFAIL$FPRINTFAIL

    # uncomment if you wish to display a message during authentication
    # check_text = Authenticating...

    # uncomment to use a letter instead of a dot to indicate the typed password
    # dots_text_format = E
    # dots_size = 0.4
    dots_spacing = 0.2

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    # hide_input = true

    position = 0, -100
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 90
    font_family = $font

    position = 0 , 100
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size = 25
    font_family = $font

    position = 0, 0
    halign = center
    valign = center
}